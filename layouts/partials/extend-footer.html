<script>
document.addEventListener('DOMContentLoaded', function () {
  // Parallax on hero background
  var heroBg = document.getElementById('background-image');
  if (heroBg) {
    window.addEventListener('scroll', function () {
      var scrollY = window.scrollY;
      heroBg.style.transform = 'translateY(' + scrollY * 0.3 + 'px) scale(1.05)';
    }, { passive: true });
  }

  // 3D tilt on article cards (interactive, follows mouse)
  document.querySelectorAll('.article-link--card').forEach(function (card) {
    card.addEventListener('mousemove', function (e) {
      var rect = card.getBoundingClientRect();
      var x = e.clientX - rect.left;
      var y = e.clientY - rect.top;
      var centerX = rect.width / 2;
      var centerY = rect.height / 2;
      var rotateX = (y - centerY) / centerY * -5;
      var rotateY = (x - centerX) / centerX * 5;
      card.style.transform = 'perspective(1000px) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg) translateY(-4px)';
      card.style.boxShadow = '0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(249,115,22,0.15)';
    });
    card.addEventListener('mouseleave', function () {
      card.style.transform = '';
      card.style.boxShadow = '';
    });
  });

  // Scroll reveal: triggers once per element
  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('revealed');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.article-link--card, main section > h2').forEach(function (el, i) {
    el.style.transitionDelay = (i * 0.1) + 's';
    el.classList.add('reveal-on-scroll');
    observer.observe(el);
  });
});
</script>
<style>
.reveal-on-scroll {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease-out, transform 0.6s ease-out;
}
.reveal-on-scroll.revealed {
  opacity: 1;
  transform: translateY(0);
}
.article-link--card {
  transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.4s ease;
  transform-style: preserve-3d;
}
</style>
